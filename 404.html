<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Theme Initialization Script -->
  <script>
    (function() {
      // Production Hostname Enforcer
      if (window.location.hostname !== 'pixopdf.online' && 
          window.location.hostname !== 'localhost' && 
          window.location.hostname !== '127.0.0.1') {
        window.location.replace('https://pixopdf.online' + window.location.pathname + window.location.search);
      }
      const savedTheme = localStorage.getItem('pixopdf-theme');
      const theme = savedTheme || 'light';
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Page Not Found | PixoPDF</title>
  <meta name="description" content="The page you're looking for doesn't exist or may have moved.">

  <!-- CSS -->
  <link rel="stylesheet" href="/css/index.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
</head>
